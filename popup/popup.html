<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrawlSub</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body data-theme="dark">
    <main class="panel">
      <header class="topbar">
        <h1>CRAWLSUB</h1>
        <div class="topbar-right">
          <div class="theme-switch" role="group" aria-label="Theme mode">
            <button type="button" class="theme-btn" data-theme-mode="system">SYS</button>
            <button type="button" class="theme-btn" data-theme-mode="light">L</button>
            <button type="button" class="theme-btn" data-theme-mode="dark">D</button>
          </div>
          <span id="badge" class="status-tag">IDLE</span>
        </div>
      </header>

      <div id="site-banner"></div>

      <section class="block">
        <label class="row"><input id="convert" type="checkbox" checked /><span>Convert VTT -> SRT</span></label>
        <label class="row"><input id="skipCompleted" type="checkbox" checked /><span>Skip completed subtitles</span></label>
        <label class="row"><input id="bypassCrawl" type="checkbox" /><span>Bypass episode navigation</span></label>
        <label class="row"><input id="includeSource" type="checkbox" checked /><span>Include source in filename</span></label>
        <button id="advanced-toggle" type="button">▸ ADVANCED</button>
        <div id="advanced-body">
          <label class="field"><span>RANGE&gt; Episode range (e.g. 1-7)</span><input id="episodeRange" type="text" placeholder="1-7" /></label>
          <label class="field"><span>DELAY&gt; Delay between episodes (ms)</span><input id="episodeDelayMs" type="number" min="300" max="15000" step="100" placeholder="1800" /></label>
        </div>
      </section>

      <section class="actions">
        <button id="single" class="cmd">THIS EP</button>
        <button id="full" class="cmd">ALL EPS</button>
        <button id="cancel" class="cmd danger">STOP</button>
        <button id="logs" class="cmd">LOGS</button>
      </section>

      <pre id="status" class="console">READY.</pre>
    </main>
    <script src="../src/extension-api.js"></script>
    <script src="popup-helpers.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
